name: CI • Rust

on:
  workflow_call:

permissions: {}

jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        checks:
          - advisories
          - bans licenses sources
    # prevent a sudden announcement of a new advisory from failing CI
    continue-on-error: ${{ matrix.checks == 'advisories' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: cargo deny
        uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979 # v2.0.15
        with:
          arguments: --all-features
          command: check ${{ matrix.checks }}

      - name: Summary
        run: echo "### ✅ Cargo Deny - ${{ matrix.checks }}" >> $GITHUB_STEP_SUMMARY

  cargo-machete:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: cargo machete
        uses: bnjbvr/cargo-machete@7959c845782fed02ee69303126d4a12d64f1db18 # v0.9.1

      - name: Summary
        run: echo "### ✅ Cargo Machete - no unused dependencies" >> $GITHUB_STEP_SUMMARY

  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Rust toolchain
        run: rustup toolchain install stable --profile minimal --no-self-update --component rustfmt

      - name: Format
        run: cargo fmt --all -- --check

      - name: Summary
        run: echo "### ✅ Rustfmt - all files formatted" >> $GITHUB_STEP_SUMMARY

  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            libssl-dev libasound2-dev libgtk-3-dev libopus-dev \
            cmake patchelf

      - name: Free disk space on runner
        run: rm -rf /opt/hostedtoolcache

      - name: Rust toolchain
        run: rustup toolchain install stable --profile minimal --no-self-update

      - name: Cache cargo
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2

      - name: Tests
        run: cargo test --locked --workspace --all-targets --all-features

      - name: Summary
        run: echo "### ✅ Tests - all workspace tests passed" >> $GITHUB_STEP_SUMMARY

  clippy:
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "ubuntu-22.04"
            arch: "x86_64"
            target: "x86_64-unknown-linux-gnu"
          - platform: "windows-latest"
            arch: "x86_64"
            target: "x86_64-pc-windows-msvc"
          - platform: "macos-latest"
            arch: "aarch64"
            target: "aarch64-apple-darwin" # for Arm based macs (M1 and above).

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install build dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            libssl-dev libasound2-dev libgtk-3-dev libopus-dev \
            cmake patchelf

      - name: Install build dependencies (macOS, aarch64)
        if: matrix.platform == 'macos-latest' && matrix.arch == 'aarch64'
        run: |
          brew update
          brew install opus

      - name: Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update --component clippy
          rustup target add ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          shared-key: ${{ matrix.platform }}-${{ matrix.arch }}

      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets --all-features --target ${{ matrix.target }} -- -D warnings

      - name: Summary
        run: echo "### ✅ Clippy - ${{ matrix.platform }} (${{ matrix.arch }})" >> $GITHUB_STEP_SUMMARY
