name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      node: ${{ steps.filter.outputs.node }}
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Detect changed paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            rust:
              - "**/*.rs"
              - "**/Cargo.toml"
              - "**/Cargo.lock"
              - "**/deny.toml"
              - ".github/workflows/ci-rust.yml"
              - ".github/workflows/ci-gate.yml"
            node:
              - "vacs-client/frontend/**/*.ts"
              - "vacs-client/frontend/**/*.tsx"
              - "vacs-client/frontend/index.html"
              - "vacs-client/frontend/package.json"
              - "vacs-client/frontend/tsconfig*.json"
              - "vacs-client/package.json"
              - "vacs-client/package-lock.json"
              - ".github/workflows/ci-node.yml"
              - ".github/workflows/ci-gate.yml"
            e2e:
              - "vacs-client/e2e/**"
              - ".github/workflows/ci-e2e.yml"

  rust:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    uses: ./.github/workflows/ci-rust.yml
    permissions:
      contents: read

  node:
    needs: changes
    if: needs.changes.outputs.node == 'true'
    uses: ./.github/workflows/ci-node.yml
    permissions:
      contents: read

  e2e:
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.node == 'true' || needs.changes.outputs.e2e == 'true'
    uses: ./.github/workflows/ci-e2e.yml
    permissions:
      contents: read

  gate:
    name: "CI \u2713"
    needs: [rust, node, e2e]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}
    steps:
      - name: Evaluate results
        env:
          RUST_RESULT: ${{ needs.rust.result }}
          NODE_RESULT: ${{ needs.node.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
        run: |
          failed=false
          for name in rust node e2e; do
            var="${name^^}_RESULT"
            result="${!var}"
            case "$result" in
              success|skipped) echo "$name: $result" ;;
              *)               echo "::error::$name: $result"; failed=true ;;
            esac
          done

          if [[ "$failed" == "true" ]]; then
            echo ""
            echo "One or more required CI workflows failed."
            exit 1
          fi

          echo ""
          echo "All required checks passed or were skipped."

      - name: Summary
        if: always()
        env:
          RUST_RESULT: ${{ needs.rust.result }}
          NODE_RESULT: ${{ needs.node.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
        run: |
          icon() { case "$1" in success) echo "✅";; skipped) echo "⏭️";; *) echo "❌";; esac }

          echo "### CI Gate" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Workflow | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Rust | $(icon "$RUST_RESULT") $RUST_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Node | $(icon "$NODE_RESULT") $NODE_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E | $(icon "$E2E_RESULT") $E2E_RESULT |" >> $GITHUB_STEP_SUMMARY
