name: CI • Node

on:
  workflow_call:

permissions: {}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    defaults:
      run:
        working-directory: vacs-client

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node (LTS)
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "lts/*"
          cache: "npm"
          cache-dependency-path: vacs-client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run -w frontend typecheck

      - name: Lint
        run: npm run -w frontend lint

      - name: Format
        run: npm run format:check

      - name: Test
        run: npm test -w frontend

      - name: Summary
        run: echo "### ✅ Node CI - typecheck, lint, format & tests passed" >> $GITHUB_STEP_SUMMARY
