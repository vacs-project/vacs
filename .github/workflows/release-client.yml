name: Release • vacs-client

on:
  push:
    tags:
      - "vacs-client-v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (1.2.3, v1.2.3, or vacs-client-v1.2.3)"
        required: true
        type: string
      ref:
        description: "Git ref to build (branch/tag/SHA). Empty = default branch tip."
        required: false
        default: ""
        type: string

permissions: {}

jobs:
  prep:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    outputs:
      version: ${{ steps.vars.outputs.version }}
      tag: ${{ steps.vars.outputs.tag }}
      draft: ${{ steps.vars.outputs.draft }}
      prerelease: ${{ steps.vars.outputs.prerelease }}
      release_name: ${{ steps.vars.outputs.release_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Resolve version & tag
        id: vars
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            RAW="${INPUT_VERSION}"
          else
            RAW="${GITHUB_REF_NAME}"  # e.g. vacs-client-v1.2.3
          fi

          # Extract X.Y.Z from: 1.2.3 | v1.2.3 | vacs-client-v1.2.3 | 1.2.3-rc.1
          if [[ "$RAW" =~ ([0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?) ]]; then
            VER="${BASH_REMATCH[1]}"
          else
            echo "Could not parse semver from: $RAW" >&2
            exit 1
          fi

          TAG="vacs-client-v${VER}"
          REL_NAME="vacs-client: v${VER}"

          # Draft release when manual; published on tag-push
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            DRAFT=true
          else
            DRAFT=false
          fi

          # Mark prerelease if version contains a prerelease part (e.g., -rc.1)
          if [[ "$VER" =~ -[A-Za-z0-9] ]]; then
            PRERELEASE=true
          else
            PRERELEASE=false
          fi

          echo "version=$VER"       >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"           >> "$GITHUB_OUTPUT"
          echo "draft=$DRAFT"       >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "release_name=$REL_NAME" >> "$GITHUB_OUTPUT"

  licenses:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Setup Node (LTS)
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "lts/*"
          cache: "npm"
          cache-dependency-path: vacs-client/package-lock.json

      - name: Install npm dependencies
        working-directory: vacs-client
        run: npm ci

      - name: Rust toolchain
        run: rustup toolchain install stable --profile minimal --no-self-update

      - name: Cache cargo
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          shared-key: licenses

      - name: Install cargo-about
        run: cargo install cargo-about --locked

      - name: Generate third-party licenses
        run: python3 scripts/generate-licenses.py --output THIRD_PARTY_LICENSES.html

      - name: Upload licenses artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: third-party-licenses
          path: THIRD_PARTY_LICENSES.html
          if-no-files-found: error
          retention-days: 30

  build:
    needs: [prep, licenses]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "ubuntu-22.04"
            arch: "x86_64"
            target: "x86_64-unknown-linux-gnu"
          - platform: "windows-latest"
            arch: "x86_64"
            target: "x86_64-pc-windows-msvc"
          - platform: "macos-latest"
            arch: "aarch64"
            target: "aarch64-apple-darwin" # for Arm based macs (M1 and above).
          - platform: "macos-latest"
            arch: "x86_64"
            target: "x86_64-apple-darwin" # for Intel based macs.

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60
    permissions:
      contents: read
      attestations: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Prepare additional version information for manual release
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          TAG: ${{ needs.prep.outputs.tag }}
          VERSION: ${{ needs.prep.outputs.version }}
        run: |
          # create/update a lightweight tag locally so vergen sees it
          git tag -f "$TAG" HEAD
          git describe --tags --always
          # override version info built into client
          echo "VACS_VERSION_OVERRIDE=$VERSION" >> "$GITHUB_ENV"
          # build tauri user config with version info and release config
          echo "EXTRA_TAURI_ARGS=--config '{\"version\":\"$VERSION\"}' --config tauri.release.conf.json" >> "$GITHUB_ENV"

      - name: Set release tauri config
        if: github.event_name != 'workflow_dispatch'
        shell: bash
        run: echo "EXTRA_TAURI_ARGS=--config tauri.release.conf.json" >> "$GITHUB_ENV"

      - name: Install build dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            libssl-dev libasound2-dev libgtk-3-dev libopus-dev \
            cmake patchelf

      - name: Install build dependencies (macOS, aarch64)
        if: matrix.platform == 'macos-latest' && matrix.arch == 'aarch64'
        run: |
          brew update
          brew install opus

      - name: Install build dependencies (macOS, x86_64)
        if: matrix.platform == 'macos-latest' && matrix.arch == 'x86_64'
        run: |
          if [ ! -f /usr/local/bin/brew ]; then
            arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          fi

          arch -x86_64 /usr/local/bin/brew update
          arch -x86_64 /usr/local/bin/brew install opus

          echo "PKG_CONFIG_PATH=/usr/local/opt/opus/lib/pkgconfig" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV

      - name: Setup Node (LTS)
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "lts/*"
          cache: "npm"
          cache-dependency-path: vacs-client/package-lock.json

      - name: Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup target add ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          shared-key: ${{ matrix.platform }}-${{ matrix.arch }}

      - name: Install frontend dependencies
        working-directory: vacs-client
        run: npm ci

      - name: Download third-party licenses
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: third-party-licenses

      - name: Build
        uses: tauri-apps/tauri-action@73fb865345c54760d875b94642314f8c0c894afa # v0.6.1
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_SIGNING_RPM_KEY: ${{ secrets.TAURI_SIGNING_RPM_KEY }}
          TAURI_SIGNING_RPM_KEY_PASSPHRASE: ${{ secrets.TAURI_SIGNING_RPM_KEY_PASSPHRASE }}
        with:
          projectPath: vacs-client
          appVersion: ${{ needs.prep.outputs.version }}
          args: ${{ matrix.target && format('--target {0}', matrix.target) }} ${{ env.EXTRA_TAURI_ARGS }}
          includeUpdaterJson: false

      - name: Rename macOS bundles to include version & architecture
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ needs.prep.outputs.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          if [[ "$TARGET" == "" ]]; then
            BUNDLE_DIR="target/release/bundle"
          else
            BUNDLE_DIR="target/${TARGET}/release/bundle"
          fi

          if [[ -f "$BUNDLE_DIR/macos/vacs.app.tar.gz" ]]; then
            mv "$BUNDLE_DIR/macos/vacs.app.tar.gz" "$BUNDLE_DIR/macos/vacs_${VERSION}_${ARCH}.app.tar.gz"
          fi
          if [[ -f "$BUNDLE_DIR/macos/vacs.app.tar.gz.sig" ]]; then
            mv "$BUNDLE_DIR/macos/vacs.app.tar.gz.sig" "$BUNDLE_DIR/macos/vacs_${VERSION}_${ARCH}.app.tar.gz.sig"
          fi

      - name: Upload bundles as artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: bundles-${{ matrix.platform }}-${{ matrix.arch }}
          if-no-files-found: error
          retention-days: 30
          path: |
            target/**/release/bundle/**/*.msi
            target/**/release/bundle/**/*.msi.sig
            target/**/release/bundle/**/*.exe
            target/**/release/bundle/**/*.exe.sig
            target/**/release/bundle/**/*.deb
            target/**/release/bundle/**/*.deb.sig
            target/**/release/bundle/**/*.rpm
            target/**/release/bundle/**/*.rpm.sig
            target/**/release/bundle/**/*.AppImage
            target/**/release/bundle/**/*.AppImage.sig
            target/**/release/bundle/macos/vacs_*_*.app.tar.gz
            target/**/release/bundle/macos/vacs_*_*.app.tar.gz.sig
            target/**/release/bundle/dmg/*.dmg
            target/**/release/bundle/dmg/*.dmg.sig

      - name: Generate SBOM
        uses: anchore/sbom-action@17ae1740179002c89186b61233e0f892c3118b11 # v0.23.0
        with:
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest build provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            target/**/release/bundle/**/*.msi
            target/**/release/bundle/**/*.msi.sig
            target/**/release/bundle/**/*.exe
            target/**/release/bundle/**/*.exe.sig
            target/**/release/bundle/**/*.deb
            target/**/release/bundle/**/*.deb.sig
            target/**/release/bundle/**/*.rpm
            target/**/release/bundle/**/*.rpm.sig
            target/**/release/bundle/**/*.AppImage
            target/**/release/bundle/**/*.AppImage.sig
            target/**/release/bundle/macos/vacs_*_*.app.tar.gz
            target/**/release/bundle/macos/vacs_*_*.app.tar.gz.sig
            target/**/release/bundle/dmg/*.dmg
            target/**/release/bundle/dmg/*.dmg.sig

      - name: Attest SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            target/**/release/bundle/**/*.msi
            target/**/release/bundle/**/*.exe
            target/**/release/bundle/**/*.deb
            target/**/release/bundle/**/*.rpm
            target/**/release/bundle/**/*.AppImage
            target/**/release/bundle/macos/vacs_*_*.app.tar.gz
            target/**/release/bundle/dmg/*.dmg
          sbom-path: sbom.spdx.json

  release:
    needs: [prep, build]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read # write access for the release is via the App token below
      attestations: write
      id-token: write

    steps:
      - name: Download bundles from artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          path: dist
          pattern: bundles-*
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        env:
          VERSION: ${{ needs.prep.outputs.version }}
        run: |
          out="SHA256SUMS-${VERSION}.txt"
          : > "$out"
          while IFS= read -r -d '' f; do
            sum=$(shasum -a 256 "$f" | cut -d' ' -f1)
            echo "$sum  $(basename "$f")" >> "$out"
          done < <(find . -type f \
            ! -name 'SHA256SUMS*' \
            ! -name '*.app' \
            -print0 | sort -z)

      - name: Install Cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

      - name: Sign checksums using Cosign with GitHub OIDC Token
        working-directory: dist
        env:
          VERSION: ${{ needs.prep.outputs.version }}
        run: |
          cosign sign-blob --yes \
            --bundle "SHA256SUMS-${VERSION}.txt.bundle.json" \
            "SHA256SUMS-${VERSION}.txt"

      - name: Attest release artifacts
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: dist/SHA256SUMS-${{ needs.prep.outputs.version }}.txt

      - name: Generate GitHub token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        id: generate-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Create/update GitHub release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          token: ${{ steps.generate-token.outputs.token }}
          tag_name: ${{ needs.prep.outputs.tag }}
          name: ${{ needs.prep.outputs.release_name }}
          draft: ${{ needs.prep.outputs.draft }}
          prerelease: ${{ needs.prep.outputs.prerelease }}
          make_latest: ${{ needs.prep.outputs.draft == 'false' && needs.prep.outputs.prerelease == 'false' }}
          files: |
            dist/**
